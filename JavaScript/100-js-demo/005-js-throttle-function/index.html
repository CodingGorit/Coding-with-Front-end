<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 实现节流功能</title>
</head>
<body>
    <h3>
        目的：规定时间内多次触发，只有一次生效
    </h3>
    <h3>
        场景：监听游览器滚动
    </h3>

    <script>
        function thorttle(fn, delay) {
            let timer;
            return function() {
                if (timer) {
                    return false;
                }
                timer = setTimeout(() => {
                    fn();   // clear 之前
                    clearTimeout(timer);
                    timer = null;
                }, delay);
            }
        }
    </script>
</body>
</html>
